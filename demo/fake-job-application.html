<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Job Application Form</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --panel: #ffffff;
      --text: #122033;
      --muted: #4d617a;
      --line: #d4deea;
      --brand: #0d6f62;
      --brand-2: #0b5a50;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, #e7fff8, transparent 35%),
        radial-gradient(circle at 85% 20%, #e8f1ff, transparent 40%),
        var(--bg);
    }

    .wrap {
      max-width: 980px;
      margin: 28px auto;
      padding: 0 16px 20px;
    }

    .hero {
      background: linear-gradient(120deg, #0d6f62, #0c5f8f);
      color: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 28px rgba(13, 111, 98, 0.26);
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: 1.45rem;
      letter-spacing: 0.2px;
    }

    .hero p {
      margin: 0;
      opacity: 0.92;
      font-size: 0.95rem;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 18px rgba(17, 33, 56, 0.08);
    }

    .section {
      margin-bottom: 18px;
    }

    .section h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #123a62;
      border-bottom: 1px solid var(--line);
      padding-bottom: 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.84rem;
      color: var(--muted);
      font-weight: 600;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      font-size: 0.93rem;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .actions {
      margin-top: 8px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .primary {
      background: var(--brand);
      color: #fff;
    }

    .primary:hover {
      background: var(--brand-2);
    }

    .ghost {
      background: #e6f0ff;
      color: #22415f;
    }

    .note {
      margin-top: 10px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Aurora Labs - Software Engineer Application</h1>
      <p>Demo page for testing secure autofill and learning behavior.</p>
    </section>

    <form class="panel" id="job-form" autocomplete="on">
      <section class="section">
        <h2>Personal Information</h2>
        <div class="grid">
          <div class="field">
            <label for="firstName">First Name</label>
            <input id="firstName" name="first_name" autocomplete="given-name" placeholder="Taylor" />
          </div>
          <div class="field">
            <label for="lastName">Last Name</label>
            <input id="lastName" name="last_name" autocomplete="family-name" placeholder="Jordan" />
          </div>
          <div class="field">
            <label for="fullName">Legal Full Name</label>
            <input id="fullName" name="full_name" placeholder="Taylor Jordan" />
          </div>
          <div class="field">
            <label for="email">Email Address</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="name@example.com" />
          </div>
          <div class="field">
            <label for="phone">Phone Number</label>
            <input id="phone" name="phone" type="tel" autocomplete="tel" placeholder="(555) 555-0101" />
          </div>
          <div class="field">
            <label for="cell">Cell Number</label>
            <input id="cell" name="cell_number" type="tel" placeholder="(555) 555-0110" />
          </div>
          <div class="field full">
            <label for="address">Street Address</label>
            <input id="address" name="address_line_1" autocomplete="street-address" placeholder="123 Main Street" />
          </div>
          <div class="field">
            <label for="city">City</label>
            <input id="city" name="city" autocomplete="address-level2" placeholder="San Diego" />
          </div>
          <div class="field">
            <label for="state">State / Province</label>
            <input id="state" name="state" autocomplete="address-level1" placeholder="CA" />
          </div>
          <div class="field">
            <label for="zip">Postal Code</label>
            <input id="zip" name="postal_code" autocomplete="postal-code" placeholder="92101" />
          </div>
          <div class="field">
            <label for="country">Country</label>
            <input id="country" name="country" autocomplete="country-name" placeholder="United States" />
          </div>
        </div>
      </section>

      <section class="section">
        <h2>Professional Links</h2>
        <div class="grid">
          <div class="field">
            <label for="linkedin">LinkedIn URL</label>
            <input id="linkedin" name="linkedin" type="url" placeholder="https://linkedin.com/in/yourname" />
          </div>
          <div class="field">
            <label for="github">GitHub Profile</label>
            <input id="github" name="github" type="url" placeholder="https://github.com/yourname" />
          </div>
          <div class="field full">
            <label for="website">Portfolio Website</label>
            <input id="website" name="portfolio_url" type="url" placeholder="https://yourportfolio.dev" />
          </div>
        </div>
      </section>

      <section class="section">
        <h2>Experience Snapshot</h2>
        <div class="grid">
          <div class="field">
            <label for="years">Years of Experience</label>
            <select id="years" name="experience_years">
              <option value="">Select</option>
              <option>0-1</option>
              <option>2-3</option>
              <option>4-6</option>
              <option>7-10</option>
              <option>10+</option>
            </select>
          </div>
          <div class="field">
            <label for="eligible">Authorized to Work in US?</label>
            <select id="eligible" name="work_authorization">
              <option value="">Select</option>
              <option>Yes</option>
              <option>No</option>
            </select>
          </div>
          <div class="field full">
            <label for="summary">Professional Summary</label>
            <textarea id="summary" name="summary" placeholder="Write a short summary of your background."></textarea>
          </div>
        </div>
      </section>

      <div class="actions">
        <button type="submit" class="primary">Submit Application</button>
        <button type="button" class="ghost" id="fill-demo">Fill Demo Data</button>
      </div>
      <p class="note">
        Tip: Click Fill Demo Data, then use your extension popup and click Save Filled Fields.
      </p>
    </form>
  </div>

  <script>
    const demoData = {
      firstName: "Taylor",
      lastName: "Jordan",
      fullName: "Taylor Jordan",
      email: "taylor.jordan@example.com",
      phone: "(555) 555-0101",
      cell: "(555) 555-0110",
      address: "123 Main Street",
      city: "San Diego",
      state: "CA",
      zip: "92101",
      country: "United States",
      linkedin: "https://linkedin.com/in/taylorjordan",
      github: "https://github.com/taylorjordan",
      website: "https://taylorjordan.dev",
      years: "4-6",
      eligible: "Yes",
      summary: "Software engineer with 5 years of experience building web applications and automation tools."
    };

    document.getElementById("fill-demo").addEventListener("click", () => {
      for (const [id, value] of Object.entries(demoData)) {
        const element = document.getElementById(id);
        if (!element) {
          continue;
        }
        element.value = value;
        element.dispatchEvent(new Event("input", { bubbles: true }));
        element.dispatchEvent(new Event("change", { bubbles: true }));
      }
    });

    document.getElementById("job-form").addEventListener("submit", (event) => {
      event.preventDefault();
      alert("Demo submit only. No data is sent.");
    });
  </script>
</body>
</html>
