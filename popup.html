<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Filler</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="app">
    <h1>Application Filler</h1>
    <p class="subtitle">Securely save once and autofill across sites.</p>

    <label for="profileSelect">Username</label>
    <select id="profileSelect"></select>

    <div class="actions">
      <input id="newProfileName" type="text" placeholder="new username" />
      <button id="createProfileBtn" class="secondary">Create</button>
    </div>

    <button id="switchProfileBtn" class="secondary profile-switch">Switch User</button>

    <label for="passphrase">Passphrase</label>
    <input id="passphrase" type="password" minlength="8" placeholder="At least 8 characters" />

    <div class="actions">
      <button id="unlockBtn" class="primary">Unlock</button>
      <button id="lockBtn" class="secondary">Lock</button>
    </div>

    <hr />

    <div class="actions column">
      <button id="saveBtn" class="primary">Save Filled Fields</button>
      <button id="fillBtn" class="secondary">Autofill This Page</button>
    </div>

    <label class="toggle-row" for="manualLearnToggle">
      <input id="manualLearnToggle" type="checkbox" />
      <span>Learn from manual typing</span>
    </label>

    <p id="status" class="status">Vault locked.</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
